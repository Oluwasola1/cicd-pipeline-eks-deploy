replicaCount: 2

image:
  # These two are overridden at deploy time by the GitHub Actions workflow
  # via `--set image.repository=... --set image.tag=...` — the values here
  # are just safe local defaults so `helm install` doesn't fail if run manually.
  repository: cicd-demo
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 250m
    memory: 256Mi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 3
  periodSeconds: 5
