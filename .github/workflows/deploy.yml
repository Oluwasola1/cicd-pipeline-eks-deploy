name: CI/CD Pipeline

on:
  push:
    branches: [main]

env:
  AWS_REGION: eu-central-1
  EKS_CLUSTER_NAME: eks-foundation
  ECR_REPOSITORY: cicd-demo
  HELM_RELEASE: cicd-demo

jobs:
  # ---------------------------------------------------------------
  # Job 1: run tests before building anything
  # ---------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest app/

  # ---------------------------------------------------------------
  # Job 2: build the Docker image and push it to ECR, tagged with
  # the short Git commit SHA (never use ":latest" for deployments —
  # you lose the ability to know exactly what code is running)
  # ---------------------------------------------------------------
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.sha_short }}
      ecr_registry: ${{ steps.login-ecr.outputs.registry }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.vars.outputs.sha_short }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

  # ---------------------------------------------------------------
  # Job 3: deploy the new image onto the EKS cluster from Project 1
  # via Helm, then roll back automatically if the rollout doesn't
  # become healthy in time.
  # ---------------------------------------------------------------
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy with Helm
        env:
          ECR_REGISTRY: ${{ needs.build-and-push.outputs.ecr_registry }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE }} helm/cicd-demo \
            --set image.repository=$ECR_REGISTRY/${{ env.ECR_REPOSITORY }} \
            --set image.tag=$IMAGE_TAG \
            --wait --timeout 3m

      - name: Roll back on failure
        if: failure()
        run: helm rollback ${{ env.HELM_RELEASE }}

      - name: Show service endpoint
        if: success()
        run: kubectl get svc ${{ env.HELM_RELEASE }}
